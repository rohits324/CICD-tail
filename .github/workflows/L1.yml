# name: Deploying Java Application into git.

# on:
#  push:
#   branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Debug structure
        run: ls -R
        
      - name: Java Install
        uses: actions/setup-java@v4
        with:
            java-version: '17'
            distribution: 'temurin'

      - name: Build Jar file
        run: mvn clean package -DskipTests
        working-directory: DemoAPP

      - name: Verify and Copy JAR
        run: |
          if ls target/*.jar 1> /dev/null 2>&1; then
            mkdir -p /tmp/myapp
            cp target/*.jar /tmp/myapp/
            echo "JAR copied successfully"
          else
            echo "JAR not found! Build failed."
            exit 1
          fi

      - name: List Target folder
        run: ls -l target/