name: Deploying Java Application into git.

on:
 push:
  branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout:
        uses: actions/checkout@v4

      - name: Java Install
        uses: actions/setup-java@v4
        with:
            java-version: '17'
            distribution: 'temurin'